<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NFV">
<title>NFV Residence</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--dk:#0a0f1e;--dk2:#0f172a;--dk3:#1e293b;--dk4:#334155;--tx:#f1f5f9;--tx2:#94a3b8;--tx3:#475569;--gd:#f59e0b;--bl:#3b82f6;--gn:#22c55e;--rd:#ef4444;--or:#f97316;--pu:#a78bfa;--br:rgba(255,255,255,0.07);--r:14px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--dk);color:var(--tx);}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--dk2)}::-webkit-scrollbar-thumb{background:var(--dk4);border-radius:2px}
/* LOGIN */
#LS{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:var(--dk);z-index:1000;overflow-y:auto;}
.li{width:64px;height:64px;background:var(--dk3);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;border:1px solid rgba(245,158,11,0.3);}
.li span{font-family:Georgia,serif;font-size:22px;font-weight:700;color:var(--gd);}
.lt{font-family:Georgia,serif;font-size:24px;text-align:center;margin-bottom:2px;}
.ls{font-size:11px;color:var(--tx3);text-align:center;letter-spacing:1px;margin-bottom:24px;}
.lc{background:var(--dk2);border:1px solid var(--br);border-radius:var(--r);padding:18px;width:100%;max-width:360px;}
.lc h3{font-size:11px;color:var(--tx3);margin-bottom:12px;font-weight:400;text-transform:uppercase;letter-spacing:0.5px;}
.rb{width:100%;background:var(--dk3);border:1px solid var(--br);color:var(--tx);padding:11px 14px;border-radius:var(--rs);margin-bottom:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;display:flex;align-items:center;gap:10px;transition:all 0.2s;text-align:left;}
.rb:hover{border-color:var(--gd);background:rgba(245,158,11,0.05);}
.rn{font-weight:500;}.rd2{font-size:10px;color:var(--tx3);margin-top:1px;}
.dv{height:1px;background:var(--br);margin:10px 0;}
.agl{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:6px;}
.abl{background:var(--dk3);border:1px solid var(--br);color:var(--tx2);padding:8px 4px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:500;text-align:center;font-family:'DM Sans',sans-serif;}
/* APP */
#AP{position:fixed;inset:0;display:none;flex-direction:column;background:var(--dk);}
.topbar{background:var(--dk2);border-bottom:1px solid var(--br);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tlogo{width:28px;height:28px;background:var(--dk3);border-radius:7px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(245,158,11,0.3);margin-right:8px;}
.tlogo span{font-family:Georgia,serif;font-size:11px;font-weight:700;color:var(--gd);}
.th1{font-size:13px;font-weight:600;}.tp{font-size:10px;color:var(--tx3);}
.live{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--gn);}
.ld{width:5px;height:5px;border-radius:50%;background:var(--gn);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;}
.panel{position:absolute;inset:0;overflow-y:auto;display:none;}
.panel.active{display:flex;flex-direction:column;}
.bnav{background:var(--dk2);border-top:1px solid var(--br);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,6px);}
.bnt{flex:1;background:none;border:none;color:var(--tx3);padding:9px 0 5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'DM Sans',sans-serif;}
.bnt.on{color:var(--gd);}
.bnt svg{width:21px;height:21px;}
.bnt span{font-size:10px;font-weight:500;}
/* CARDS */
.card{background:var(--dk2);border:1px solid var(--br);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.ctit{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sc{background:var(--dk2);border:1px solid var(--br);border-radius:var(--rs);padding:11px;}
.sl{font-size:10px;color:var(--tx3);margin-bottom:3px;}.sv{font-size:18px;font-weight:600;}
.sv.gd{color:var(--gd)}.sv.bl{color:var(--bl)}.sv.gn{color:var(--gn)}.sv.rd{color:var(--rd)}.sv.pu{color:var(--pu)}.sv.or{color:var(--or)}
.btn{border:none;padding:9px 14px;border-radius:var(--rs);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;display:inline-flex;align-items:center;gap:5px;}
.bp{background:var(--gd);color:#0a0f1e;}.bs{background:var(--dk3);border:1px solid var(--br);color:var(--tx);}
.bg{background:var(--gn);color:#0a0f1e;}.bbl{background:var(--bl);color:#fff;}
.bsm{padding:6px 10px;font-size:11px;}.bblk{width:100%;justify-content:center;}
.fg{margin-bottom:9px;}.fl{font-size:11px;color:var(--tx3);margin-bottom:3px;display:block;}
.fi{width:100%;background:var(--dk);border:1px solid var(--br);color:var(--tx);padding:8px 10px;border-radius:var(--rs);font-size:12px;font-family:'DM Sans',sans-serif;}
.fi:focus{outline:none;border-color:var(--gd);}.fi option{background:var(--dk2);}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.er{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--br);}
.er:last-child{border:none;}
.ei{width:32px;height:32px;border-radius:8px;background:var(--dk3);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.en{font-size:12px;font-weight:500;}.em{font-size:10px;color:var(--tx3);margin-top:1px;}.ea{font-weight:600;font-size:12px;}
.chip{display:inline-block;font-size:9px;padding:1px 5px;border-radius:10px;margin-left:3px;}
.co{background:rgba(167,139,250,0.15);color:var(--pu);}.ct2{background:rgba(59,130,246,0.15);color:var(--bl);}
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.ac{border-radius:8px;padding:8px 4px;text-align:center;font-size:11px;font-weight:500;cursor:pointer;}
.ac.paid{background:rgba(34,197,94,0.12);color:var(--gn);border:1px solid rgba(34,197,94,0.2);}
.ac.unpaid{background:rgba(239,68,68,0.1);color:var(--rd);border:1px solid rgba(239,68,68,0.2);}
.ac.partial{background:rgba(245,158,11,0.1);color:var(--gd);border:1px solid rgba(245,158,11,0.2);}
.ac .aa{font-size:9px;margin-top:1px;opacity:0.8;}
.pw{background:var(--dk);border-radius:20px;height:4px;overflow:hidden;margin:4px 0;}
.pf{height:100%;border-radius:20px;}
.pr{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--br);}
.pr:last-child{border:none;}
.an{background:var(--dk2);border:1px solid var(--br);border-left:3px solid var(--pu);border-radius:var(--rs);padding:11px;margin-bottom:7px;}
.at{font-size:12px;line-height:1.5;margin-bottom:3px;}.am{font-size:10px;color:var(--tx3);}
.pp{background:var(--dk3);border:1px solid var(--br);color:var(--tx);padding:5px 9px;border-radius:6px;font-size:11px;font-family:'DM Sans',sans-serif;}
.emp{text-align:center;padding:28px 14px;color:var(--tx3);font-size:12px;}
.sb{height:20px;}
/* AI */
.ai-msgs{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:7px;}
.bubble-ai{max-width:82%;background:var(--dk3);border:1px solid var(--br);color:var(--tx);padding:8px 10px;border-radius:12px 12px 12px 3px;font-size:12px;line-height:1.5;white-space:pre-line;}
.bubble-user{max-width:82%;background:var(--gd);color:#0a0f1e;padding:8px 10px;border-radius:12px 12px 3px 12px;font-size:12px;line-height:1.5;}
.sugg-btn{background:transparent;border:1px solid rgba(245,158,11,0.3);color:var(--gd);padding:4px 8px;border-radius:16px;font-size:10px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.dot-t{width:5px;height:5px;border-radius:50%;background:var(--gd);animation:bounce 1s ease infinite;}
/* ALERTS */
.al-item{display:flex;align-items:flex-start;gap:8px;padding:9px 14px;border-bottom:1px solid var(--br);}
.al-ic{width:34px;height:34px;border-radius:9px;background:var(--dk3);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
/* MENU */
.m-profile{padding:13px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:9px;}
.m-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--gd),#d97706);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#0a0f1e;font-family:Georgia,serif;}
.lang-t{display:flex;background:var(--dk3);border-radius:6px;border:1px solid var(--br);overflow:hidden;}
.lang-b{background:transparent;border:none;color:#64748b;padding:4px 9px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;}
.lang-b.on{background:var(--gd);color:#0a0f1e;font-weight:700;}
.m-st{padding:9px 14px 3px;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.8px;}
.m-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--br);cursor:pointer;}
.m-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.m-lb{font-size:12px;font-weight:500;}.m-sb{font-size:10px;color:var(--tx3);margin-top:1px;}
/* BALANCE CARD */
.bal-section{border-radius:var(--rs);padding:12px;margin-bottom:8px;border:1px solid var(--br);}
.bal-section.tenant{border-left:3px solid var(--bl);background:rgba(59,130,246,0.05);}
.bal-section.owner{border-left:3px solid var(--pu);background:rgba(167,139,250,0.05);}
.bal-section.both{border-left:3px solid var(--gd);background:rgba(245,158,11,0.05);}
.bal-yours{background:var(--dk3);border-radius:var(--rs);padding:14px;margin-bottom:10px;text-align:center;}
/* FLASH & MODAL */
#fl{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9999;padding:9px 18px;border-radius:7px;font-size:12px;display:none;box-shadow:0 4px 20px rgba(0,0,0,.6);}
#fl.ok{background:var(--gn);color:#0a0f1e;}#fl.er{background:var(--rd);color:#fff;}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.mov.op{display:flex;}
.mo{background:var(--dk2);border:1px solid var(--br);border-radius:var(--r) var(--r) 0 0;padding:18px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;}
.mt{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.mc{background:none;border:none;color:var(--tx3);font-size:22px;cursor:pointer;}
/* SUB PANEL BACK */
.back-bar{padding:8px 14px;border-bottom:1px solid var(--br);flex-shrink:0;}
.back-btn{background:none;border:none;color:var(--gd);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px;}
@media print{body *{visibility:hidden}#pa,#pa *{visibility:visible}#pa{position:fixed;top:0;left:0;width:100%}}
</style>
</head>
<body>
<div id="fl"></div>
<div id="LS">
  <div class="li"><span>NFV</span></div>
  <div class="lt">NFV Residence</div>
  <div class="ls">NEA FILOTHEI VILLAGE · ΠΑΤΜΟΥ 5Α</div>
  <div class="lc">
    <h3>Σύνδεση ως</h3>
    <button class="rb" onclick="login('admin')"><span style="font-size:16px">👑</span><div><div class="rn">Administrator</div><div class="rd2">Πλήρης πρόσβαση</div></div></button>
    <button class="rb" onclick="login('genikos')"><span style="font-size:16px">⭐</span><div><div class="rn">Γενικός Διαχειριστής</div><div class="rd2">Καταχώρηση κεντρικών εξόδων</div></div></button>
    <button class="rb" onclick="login('diax')"><span style="font-size:16px">🏗️</span><div><div class="rn">Διαχειριστής Κτηρίου</div><div class="rd2">Πάτμου 5Α — Αγγελάκης</div></div></button>
    <div class="dv"></div>
    <div style="font-size:10px;color:var(--tx3);margin-bottom:6px">Κάτοικοι / Ιδιοκτήτες</div>
    <div class="agl" id="aptGrid"></div>
  </div>
</div>
<div id="AP">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <div class="tlogo"><span>NFV</span></div>
      <div><div class="th1" id="tT">NFV</div><div class="tp" id="tS">Nea Filothei Village</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:7px">
      <div class="live"><div class="ld"></div>LIVE</div>
      <button onclick="logout()" style="background:transparent;border:1px solid var(--br);color:var(--tx3);padding:3px 8px;border-radius:5px;cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif">Exit</button>
    </div>
  </div>
  <div class="content">
    <!-- ASK/AI PANEL -->
    <div class="panel" id="pAsk">
      <div style="padding:10px 14px 7px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px;flex-shrink:0">
        <div style="width:28px;height:28px;background:linear-gradient(135deg,var(--gd),#d97706);border-radius:7px;display:flex;align-items:center;justify-content:center;"><span style="font-size:11px;font-weight:700;color:#0a0f1e;font-family:Georgia,serif">AI</span></div>
        <div><div style="font-size:12px;font-weight:600">NFV Assistant</div><div style="font-size:9px;color:var(--gn);display:flex;align-items:center;gap:2px"><div style="width:4px;height:4px;border-radius:50%;background:var(--gn)"></div>Online</div></div>
      </div>
      <div class="ai-msgs" id="aiMsgs"></div>
      <div style="padding:5px 14px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex-shrink:0" id="aiSugg"></div>
      <div style="padding:7px 14px 10px;display:flex;gap:6px;border-top:1px solid var(--br);flex-shrink:0">
        <input id="aiIn" style="flex:1;background:var(--dk3);border:1px solid var(--br);color:var(--tx);padding:8px 10px;border-radius:10px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;" placeholder="Ρώτησε για το NFV..." onkeydown="if(event.key==='Enter')sendAI()">
        <button onclick="sendAI()" style="background:var(--gd);border:none;color:#0a0f1e;width:36px;height:36px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
    <!-- ALERTS PANEL -->
    <div class="panel" id="pAlerts">
      <div style="padding:10px 14px 6px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--br);flex-shrink:0">
        <div style="font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.8px">Ειδοποιήσεις</div>
        <button onclick="markAllRead()" style="background:none;border:none;color:var(--gd);font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif">Όλα διαβαστά</button>
      </div>
      <div id="alertsList" style="overflow-y:auto;flex:1"></div>
    </div>
    <!-- MENU PANEL -->
    <div class="panel" id="pMenu">
      <div id="menuMain" style="overflow-y:auto;flex:1">
        <div class="m-profile">
          <div class="m-avatar" id="mAvatar">Μ</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600" id="mName">NFV</div><div style="font-size:10px;color:var(--gd)" id="mRole">Manager</div></div>
          <div class="lang-t">
            <button class="lang-b on" id="lEl" onclick="setLang('el')">ΕΛ</button>
            <button class="lang-b" id="lEn" onclick="setLang('en')">EN</button>
          </div>
        </div>
        <!-- NFV Insights shortcut -->
        <div onclick="showInsights()" style="margin:9px 12px;background:linear-gradient(135deg,var(--dk3),var(--dk2));border:1px solid rgba(245,158,11,0.2);border-radius:10px;padding:10px;cursor:pointer;display:flex;align-items:center;gap:8px">
          <div style="width:32px;height:32px;border-radius:8px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);display:flex;align-items:center;justify-content:center;font-size:15px">📊</div>
          <div style="flex:1"><div style="font-size:12px;font-weight:600">NFV Insights</div><div style="font-size:10px;color:#64748b" id="insSub">Στατιστικά & Αναλύσεις</div></div>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#334155" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div id="menuSecs"></div>
        <div class="sb"></div>
      </div>
      <div id="menuIns" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <button onclick="hideInsights()" style="background:none;border:none;color:var(--gd);padding:9px 14px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:4px;flex-shrink:0">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>Πίσω
        </button>
        <div id="insContent" style="overflow-y:auto;flex:1"></div>
      </div>
    </div>
    <!-- SUB PANEL -->
    <div class="panel" id="pSub">
      <div class="back-bar"><button class="back-btn" onclick="switchTab('menu')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>Πίσω</button></div>
      <div id="subContent" style="overflow-y:auto;flex:1;padding:12px 14px"></div>
    </div>
  </div>
  <div class="bnav">
    <button class="bnt" id="bnAsk" onclick="switchTab('ask')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span id="lblAsk">Ερώτηση</span>
    </button>
    <button class="bnt" id="bnAlerts" onclick="switchTab('alerts')">
      <div style="position:relative;display:inline-flex">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <div id="alertBadge" style="position:absolute;top:-3px;right:-3px;background:var(--rd);color:#fff;border-radius:50%;width:13px;height:13px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;display:none">0</div>
      </div>
      <span id="lblAlerts">Alerts</span>
    </button>
    <button class="bnt" id="bnMenu" onclick="switchTab('menu')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <span id="lblMenu">Μενού</span>
    </button>
  </div>
</div>
<div class="mov" id="MOV"><div class="mo" id="MOC"></div></div>
<div id="pa" style="display:none"></div>

<script>
// ═══════════════════════════════════
// CONFIGURATION

const sbH=()=>({
  "Content-Type":"application/json",
  "apikey":SB_KEY,
  "Authorization":"Bearer "+SB_KEY,
  "Prefer":"return=representation"
});
async function sbGet(table,params=""){
  try{const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:sbH()});return await r.json();}catch{return [];}
}
async function sbInsert(table,obj){
  try{const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:"POST",headers:sbH(),body:JSON.stringify(obj)});const j=await r.json();return Array.isArray(j)?j[0]:j;}catch{return null;}
}
async function sbUpdate(table,id,obj){
  try{await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:"PATCH",headers:sbH(),body:JSON.stringify(obj)});}catch{}
}
async function sbDelete(table,id){
  try{await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:"DELETE",headers:sbH()});}catch{}
}
async function sbUpsert(table,obj,onConflict){
  const h={...sbH(),"Prefer":"resolution=merge-duplicates,return=representation"};
  try{const r=await fetch(`${SB_URL}/rest/v1/${table}${onConflict?"?on_conflict="+onConflict:""}`,{method:"POST",headers:h,body:JSON.stringify(obj)});return await r.json();}catch{return null;}
}

// Map Supabase rows back to the internal format the app uses
function mapCE(r){return {id:r.id,description:r.description,category:r.category,amount:r.amount,period:r.period,date:r.date,createdAt:r.created_at,amtTenant:r.amt_tenant,amtOwner:r.amt_owner};}
function mapKE(r){
  const obj={id:r.id,description:r.description,category:r.category,amount:r.amount,period:r.period,date:r.date,createdAt:r.created_at,amtTenant:r.amt_tenant,amtOwner:r.amt_owner,
    gas_total_metab:r.gas_total_metab,gas_total_pagio:r.gas_total_pagio,gas_pagio_monad:r.gas_pagio_monad};
  // Attach gas units from the joined gas_units rows (populated in loadAll)
  if(r._gasUnits){r._gasUnits.forEach(g=>{obj["gas_metab_"+g.apt_id]=g.units;});}
  return obj;
}
function mapPay(r){return {id:r.id,apt:r.apt_id,period:r.period,amount:r.amount,payerType:r.payer_type,method:r.method,note:r.note,paidAt:r.paid_at,receiptNo:r.receipt_no};}
function mapAnn(r){return {id:r.id,text:r.body,author:r.author,createdAt:r.created_at};}
function mapRes(r){return {type:r.res_type,ownerName:r.owner_name,ownerEmail:r.owner_email,tenantName:r.tenant_name,tenantEmail:r.tenant_email};}
function mapFixed(r){return {id:r.id,desc:r.description,cat:r.category,amt:r.amount,type:r.charge_type,icon:r.icon||"📌"};}
function mapCoreFixed(r){return {id:r.id,desc:r.description,amt:r.amount,chargeType:r.charge_type,createdAt:r.created_at};}

async function loadAll(){
  try{
    const [ceRows,keRows,gasRows,payRows,annRows,resRows,fixedRows,cfRows]=await Promise.all([
      sbGet("central_expenses","select=*&order=created_at.desc"),
      sbGet("core_expenses","select=*&order=created_at.desc"),
      sbGet("gas_units","select=*"),
      sbGet("payments","select=*&order=paid_at.desc"),
      sbGet("announcements","select=*&order=created_at.desc"),
      sbGet("residents","select=*"),
      sbGet("fixed_expenses","select=*&order=sort_order.asc"),
      sbGet("core_fixed","select=*&order=created_at.asc"),
    ]);
    // Attach gas units to core expenses
    const gasMap={};
    (gasRows||[]).forEach(g=>{if(!gasMap[g.expense_id])gasMap[g.expense_id]=[];gasMap[g.expense_id].push(g);});
    (keRows||[]).forEach(r=>{r._gasUnits=gasMap[r.id]||[];});

    D.ce=(ceRows||[]).map(mapCE);
    D.ke=(keRows||[]).map(mapKE);
    D.pays=(payRows||[]).map(mapPay);
    D.anns=(annRows||[]).map(mapAnn);
    // Build residents dict keyed by apt_id
    D.res={};(resRows||[]).forEach(r=>{D.res[r.apt_id]=mapRes(r);});
    if(fixedRows&&fixedRows.length>0)FIXED_EXPENSES=fixedRows.map(mapFixed);
    D.coreFixed=(cfRows||[]).map(mapCoreFixed);
  }catch(e){console.error("loadAll error:",e);}
  refreshCurrent();
}

// ═══════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════
function calcCharge(aptId, p){
  const apt=getApt(aptId);
  let tenant=0, owner=0;
  // Κανονικά έξοδα (κεντρικά + πυρήνα)
  const allExp=[...D.ce,...D.ke].filter(e=>e.period===p);
  allExp.forEach(e=>{
    const amt=Number(e.amount);const type=CAT_TYPE[e.category]||"tenant";
    if(type==="tenant") tenant+=amt*apt.ck/1000;
    else if(type==="asan") tenant+=amt*apt.ca/1000;
    else if(type==="owner") owner+=amt*apt.ck/1000;
    else if(type==="express") tenant+=amt/BUILDING.totalApts;
    else if(type==="mixed"){
      // Μικτό: έχει χωριστά ποσά για κάτοικο και ιδιοκτήτη
      tenant+=Number(e.amtTenant||0)*apt.ck/1000;
      owner+=Number(e.amtOwner||0)*apt.ck/1000;
    }
    else if(type==="gas"){
      // Φόρμουλα Express Home Service:
      // ΠΑΓΙΟ:      amt × 34,89% × (μονάδες_παγίου_δ/μα / σύνολο_μονάδων_παγίου)
      // ΜΕΤΑΒΛΗΤΟ: amt × 65,11% × (μονάδες_κατανάλωσης_δ/μα / σύνολο_μονάδων_κατανάλωσης)
      const pm = parseFloat(e.gas_pagio_monad) || GAS_PAGIO_MONAD;   // 22.0
      const tp = parseFloat(e.gas_total_pagio) || GAS_TOTAL_PAGIO;   // 348.8
      const ma = parseFloat(e["gas_metab_"+aptId]) || 0;
      const tm = parseFloat(e.gas_total_metab) || 0;
      console.log("GAS DEBUG",aptId,"ma=",ma,"tm=",tm,"pm=",pm,"tp=",tp,"amt=",amt);
      const pagio = amt * GAS_PAGIO * (pm / tp);
      const metab = (ma > 0 && tm > 0) ? amt * GAS_METAB * (ma / tm) : 0;
      console.log("GAS RESULT pagio=",pagio.toFixed(2),"metab=",metab.toFixed(2));
      tenant += pagio + metab;
    }
  });
  // Κεντρικά πάγια (αυτόματα κάθε μήνα)
  FIXED_EXPENSES.forEach(f=>{
    if(f.type==="asan") tenant+=f.amt*apt.ca/1000;
    else if(f.type==="owner") owner+=f.amt*apt.ck/1000;
    else tenant+=f.amt*apt.ck/1000;
  });
  // Πάγια πυρήνα (ενεργά μέχρι να διαγραφούν)
  (D.coreFixed||[]).forEach(f=>{
    const type=f.chargeType||"tenant";
    if(type==="asan") tenant+=f.amt*apt.ca/1000;
    else if(type==="owner") owner+=f.amt*apt.ck/1000;
    else if(type==="express") tenant+=f.amt/BUILDING.totalApts;
    else tenant+=f.amt*apt.ck/1000;
  });
  return {tenant, owner, total:tenant+owner};
}

function getPaid(aptId, payerType){
  return D.pays.filter(p=>p.apt===aptId&&p.payerType===payerType).reduce((s,p)=>s+Number(p.amount),0);
}
function getBal(aptId, payerType){
  const ps=[...new Set([...D.ce,...D.ke].map(e=>e.period))];
  const charged=ps.reduce((s,p)=>{const c=calcCharge(aptId,p);return s+(payerType==="tenant"?c.tenant:c.owner);},0);
  return charged-getPaid(aptId,payerType);
}
function getTotalBal(aptId){return getBal(aptId,"tenant")+getBal(aptId,"owner");}

// Ποσό που αναλογεί ανάλογα με ρόλο
function getMyAmount(aptId, payerType){
  const res=getRes(aptId);
  // owner_living πληρώνει και τα δύο
  if(res.type==="owner_living") return getBal(aptId,"tenant")+getBal(aptId,"owner");
  if(payerType==="tenant") return getBal(aptId,"tenant");
  if(payerType==="owner") return getBal(aptId,"owner");
  return getTotalBal(aptId);
}

    if(el)el.classList.toggle("active",p===id);

  });

function showSub(html){
  document.getElementById("subContent").innerHTML=html;
  ["pAsk","pAlerts","pMenu"].forEach(p=>{const el=document.getElementById(p);if(el)el.classList.remove("active");});
  document.getElementById("pSub").classList.add("active");

function refreshCurrent(){
  if(tab==="ask")renderAIMsgs();
  else if(tab==="alerts")buildAlerts();
  const sub=document.getElementById("subContent");
  if(sub&&sub.dataset.view){
    const v=sub.dataset.view;
    if(v.startsWith("openExpenses"))openExpenses(v.includes("'ce'")?"ce":"ke");
    else if(v.startsWith("openStatus"))openStatus();
    else if(v.startsWith("openPayments"))openPayments();
    else if(v.startsWith("openResidents"))openResidents();
    else if(v.startsWith("openAnns"))openAnns();
  }
}

    if(low.includes("πλήρωσει")||low.includes("paid")||low.includes("χρωστ")||low.includes("εκκρεμ")){
      const un=APTS.filter(a=>getTotalBal(a.id)>0.01).map(a=>`${a.lbl} ${a.name}: ${fmt(Math.max(0,getTotalBal(a.id)))}`);
      resp=un.length>0?(lang==="el"?`Εκκρεμείς (${un.length}):\n`:`Outstanding (${un.length}):\n`)+un.join("\n"):(lang==="el"?"✅ Όλοι έχουν πληρώσει!":"✅ All paid!");
    } else if(low.includes("σύνολο")||low.includes("total")||low.includes("έξοδ")){
      const tot=[...D.ce,...D.ke].filter(e=>e.period===period).reduce((s,e)=>s+Number(e.amount),0);
      resp=(lang==="el"?`Σύνολο ${pLbl(period)}:\n`:`Total ${pLbl(period)}:\n`)+fmt(tot);
    } else if(low.includes("ειδοποιητήριο")||low.includes("notice")){
      resp=lang==="el"?"Πήγαινε: Μενού → Ειδοποιητήρια":"Go to: Menu → Notices";
    } else if(low.match(/[αβγδa-d][0-9π]/i)||low.includes("υπόλοιπο")||low.includes("balance")){
      const match=text.match(/([αβγδa-dΑΒΓΔ][0-9π])/i);
      if(match){
        const lbl=match[1].toUpperCase();
        const apt=APTS.find(a=>a.lbl===lbl||a.id.toUpperCase()===lbl);
        if(apt){
          const tb=getBal(apt.id,"tenant");const ob=getBal(apt.id,"owner");
          resp=`${apt.lbl} — ${apt.name}\n${lang==="el"?"Κάτοικος":"Tenant"}: ${fmt(Math.max(0,tb))}\n${lang==="el"?"Ιδιοκτήτης":"Owner"}: ${fmt(Math.max(0,ob))}\n${lang==="el"?"Σύνολο":"Total"}: ${fmt(Math.max(0,tb+ob))}`;
        }
      } else resp=lang==="el"?"Ρώτα π.χ. 'Υπόλοιπο Α5'":"Ask e.g. 'Balance A5'";
    } else {
      resp=lang==="el"?"Μπορώ να σε βοηθήσω με πληρωμές, έξοδα, υπόλοιπα ή ειδοποιητήρια! 💡":"I can help with payments, expenses, balances or notices! 💡";
    }
    aiMsgs.push({from:"ai",text:resp});renderAIMsgs();
  },1100);
}

function buildAlerts(){
  const c=document.getElementById("alertsList");if(!c)return;c.innerHTML="";
  const alerts=[];
  // Εκκρεμείς πληρωμές
  APTS.forEach(a=>{const b=getTotalBal(a.id);if(b>0.01)alerts.push({p:"high",icon:"⚠️",title:`${a.lbl} — ${lang==="el"?"Εκκρεμής Πληρωμή":"Overdue Payment"}`,body:fmt(b),time:"",unread:true});});
  // Ανακοινώσεις
  D.anns.slice(0,3).forEach(a=>alerts.push({p:"med",icon:"📢",title:lang==="el"?"Ανακοίνωση":"Announcement",body:a.text.slice(0,50),time:fmtD(a.createdAt),unread:false}));
  if(alerts.length===0){c.innerHTML=`<div class="emp">${lang==="el"?"Δεν υπάρχουν ειδοποιήσεις":"No notifications"}</div>`;return;}
  const badge=document.getElementById("alertBadge");
  const unread=alerts.filter(a=>a.unread).length;
  badge.style.display=unread>0?"flex":"none";badge.textContent=unread;
  const cols={high:"var(--rd)",med:"var(--gd)",low:"#475569"};
  alerts.forEach(a=>{
    const d=document.createElement("div");d.className="al-item";
    d.style.background=a.unread?`${cols[a.p]||""}15`:"transparent";
    d.innerHTML=`<div class="al-ic" style="border:1px solid ${cols[a.p]||"var(--br)"}30">${a.icon}</div>
      <div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:2px">
      <div style="font-size:11px;font-weight:${a.unread?600:400}">${a.title}</div>
      <div style="font-size:9px;color:var(--tx3)">${a.time}</div></div>
      <div style="font-size:10px;color:#64748b">${a.body}</div></div>
      ${a.unread?`<div style="width:6px;height:6px;border-radius:50%;background:${cols[a.p]};flex-shrink:0;margin-top:3px"></div>`:""}`;
    c.appendChild(d);
  });
}
function markAllRead(){document.getElementById("alertBadge").style.display="none";}

    h+=`<div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:var(--rs);padding:10px;margin-bottom:10px;font-size:11px">`;

    FIXED_EXPENSES.forEach(f=>{h+=`<div style="display:flex;justify-content:space-between;color:var(--tx2);margin-bottom:2px"><span>${f.icon} ${f.desc}</span><span style="font-weight:600">${fmt(f.amt)}</span></div>`;});
    h+=`<div style="font-size:10px;color:var(--tx3);margin-top:5px">Μοιράζονται αυτόματα × χιλιοστά σε κάθε δ/μα</div></div>`;
  }
  h+=`<div class="card" style="margin-bottom:10px;background:var(--dk3)">`;
  h+=`<div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:var(--tx3)">${isCe?"⭐ Κεντρικά":"🏗️ Πυρήνας"} ${pLbl(period)}</span><span style="color:var(--gd);font-weight:600">${fmt(total)}</span></div></div>`;
  // Πάγια πυρήνα (ενεργά)
  if(!isCe){
    h+=`<div style="background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2);border-radius:var(--rs);padding:10px;margin-bottom:10px;font-size:11px">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">`;
    h+=`<div style="color:var(--or);font-weight:600">📌 Πάγια Πυρήνα (ενεργά)</div>`;
    h+=`<button onclick="editCoreFixed()" style="background:var(--dk3);border:1px solid var(--br);color:var(--tx3);padding:3px 8px;border-radius:5px;cursor:pointer;font-size:10px;font-family:'DM Sans',sans-serif">+ Νέο Πάγιο</button></div>`;
    if(activeCF.length===0){
      h+=`<div style="color:var(--tx3);font-size:10px">Δεν υπάρχουν ενεργά πάγια πυρήνα</div>`;

  h+=`<div style="font-size:10px;color:var(--tx3);margin-bottom:8px">Ανάλυση μικτού εξόδου:</div>`;
  h+=`<div class="fg2"><div class="fg"><label class="fl">🏠 Ποσό Κατοίκου (€)</label><input id="eAmtT" class="fi" type="number" step="0.01" value="${ex?.amtTenant||""}" placeholder="0.00"></div>`;
  h+=`<div class="fg"><label class="fl">🔑 Ποσό Ιδιοκτήτη (€)</label><input id="eAmtO" class="fi" type="number" step="0.01" value="${ex?.amtOwner||""}" placeholder="0.00"></div></div>`;
  h+=`<div class="fg"><label class="fl">Ημερομηνία</label><input id="eDateM" class="fi" type="date" value="${ex?.date||new Date().toISOString().slice(0,10)}"></div></div>`;
  // Gas fields
  if(dbType==="ke"){
    h+=`<div id="gasF" style="display:${isGas?"block":"none"};background:var(--dk3);border-radius:8px;padding:10px;margin-bottom:10px">`;

function getTypeChipHtml(type){
  if(type==="tenant") return `<span style="background:rgba(59,130,246,0.15);color:var(--bl);padding:3px 10px;border-radius:12px">🏠 Κάτοικος</span>`;

function calcGasTotal(){
  let sum=0;
  APTS.forEach(a=>{if(a.id==="AP")return;const el=document.getElementById("eG_"+a.id);if(el)sum+=parseFloat(el.value)||0;});
  const lbl=document.getElementById("gasSumLbl");
  const totM=parseFloat(document.getElementById("eTotM")?.value)||0;
  const alert=document.getElementById("gasSumAlert");
  if(lbl)lbl.textContent="άθροισμα: "+sum.toFixed(1);
  if(alert){
    const diff=Math.abs(sum-totM);
    alert.style.display=(totM>0&&diff>0.5)?"block":"none";
    if(lbl)lbl.style.color=diff>0.5?"var(--rd)":"var(--gn)";
  }
}
function onCatCh(cat,dbType){
  const d=document.getElementById("eDesc");if(d&&!d.value||d.value===document.getElementById("eCat").dataset.prev)d.value=cat;

async function saveExp(dbType,editId){
  const cat=document.getElementById("eCat").value;
  const type=CAT_TYPE[cat]||"tenant";
  const desc=document.getElementById("eDesc").value;
  if(!desc){flash(lang==="el"?"Συμπλήρωσε περιγραφή":"Fill description","er");return;}
  let e={description:desc,category:cat,period,createdAt:new Date().toISOString()};

  if(type==="mixed"){
    // Μικτό: χωριστά ποσά
    const amtT=parseFloat(document.getElementById("eAmtT").value)||0;
    const amtO=parseFloat(document.getElementById("eAmtO").value)||0;
    if(amtT<=0&&amtO<=0){flash(lang==="el"?"Βάλε τουλάχιστον ένα ποσό":"Add at least one amount","er");return;}
    e.amtTenant=amtT;e.amtOwner=amtO;
    e.amount=amtT+amtO;
    e.date=document.getElementById("eDateM").value;
  } else {
    const amt=document.getElementById("eAmt").value;
    if(!amt){flash(lang==="el"?"Συμπλήρωσε ποσό":"Fill amount","er");return;}
    e.amount=parseFloat(amt);
    e.date=document.getElementById("eDate").value;
  }

  if(cat==="Φυσικό Αέριο"){
    const totM=parseFloat(document.getElementById("eTotM").value);
    const totP=parseFloat(document.getElementById("eTotP").value);
    const pagMon=parseFloat(document.getElementById("ePagMon").value);
    if(!totM||totM<=0){flash(lang==="el"?"Βάλε Σύνολο Μεταβλητού":"Enter Total Variable units","er");return;}
    if(!totP||totP<=0){flash(lang==="el"?"Βάλε Σύνολο Παγίου":"Enter Total Fixed units","er");return;}
    if(!pagMon||pagMon<=0){flash(lang==="el"?"Βάλε Μονάδες Παγίου Δ/μα":"Enter Fixed units for apartment","er");return;}
    e.gas_total_metab=totM;
    e.gas_total_pagio=totP;
    e.gas_pagio_monad=pagMon;
    let sumMetab=0;
    APTS.forEach(a=>{const el=document.getElementById("eG_"+a.id);if(el){const v=parseFloat(el.value)||0;e["gas_metab_"+a.id]=v;sumMetab+=v;}});
    if(Math.abs(sumMetab-totM)>0.5){
      if(!confirm("Το άθροισμα μονάδων ("+sumMetab.toFixed(1)+") δεν συμφωνεί με το σύνολο ("+totM+"). Συνέχεια;"))return;
    }
  }

  // Map to Supabase column names
  const table=dbType==="ce"?"central_expenses":"core_expenses";
  const row={description:e.description,category:e.category,amount:e.amount,period:e.period,date:e.date||null,
    created_at:e.createdAt,amt_tenant:e.amtTenant||null,amt_owner:e.amtOwner||null};
  if(dbType==="ke"){
    row.gas_total_metab=e.gas_total_metab||null;
    row.gas_total_pagio=e.gas_total_pagio||null;
    row.gas_pagio_monad=e.gas_pagio_monad||null;
  }
  let expId=editId;
  if(editId){
    await sbUpdate(table,editId,row);
  } else {
    const ins=await sbInsert(table,row);
    expId=ins?.id;
  }
  // Gas units: delete old, re-insert new
  if(dbType==="ke"&&expId&&e.category==="Φυσικό Αέριο"){
    await fetch(`${SB_URL}/rest/v1/gas_units?expense_id=eq.${expId}`,{method:"DELETE",headers:sbH()});
    const gasRows=[];
    APTS.forEach(a=>{const v=e["gas_metab_"+a.id];if(v>0)gasRows.push({expense_id:expId,apt_id:a.id,units:v});});
    if(gasRows.length>0)await sbInsert("gas_units",gasRows);
  }
  await loadAll();closeM();flash("✓");openExpenses(dbType);
}
async function delExp(dbType,id){
  if(!confirm(lang==="el"?"Διαγραφή;":"Delete?"))return;
  const table=dbType==="ce"?"central_expenses":"core_expenses";
  if(dbType==="ke")await fetch(`${SB_URL}/rest/v1/gas_units?expense_id=eq.${id}`,{method:"DELETE",headers:sbH()});
  await sbDelete(table,id);
  await loadAll();flash(lang==="el"?"Διαγράφηκε":"Deleted");openExpenses(dbType);
}

function printNotice(aptId, receiverType){
  const apt=getApt(aptId);
  const res=getRes(aptId);
  const c=calcCharge(aptId,period);
  const tb=getBal(aptId,"tenant");const ob=getBal(aptId,"owner");
  const allExps=[...D.ce,...D.ke].filter(e=>e.period===period);
  let tenRows="",ownRows="";
  allExps.forEach(e=>{
    const type=CAT_TYPE[e.category]||"tenant";
    if(type==="mixed"){
      // Μικτό: χωριστές γραμμές
      const st=Number(e.amtTenant||0)*apt.ck/1000;
      const so=Number(e.amtOwner||0)*apt.ck/1000;
      if(st>0.005)tenRows+=`<tr><td>${e.description} <span style="font-size:9px;color:#3b82f6">Κάτ.</span></td><td style="color:#888;font-size:10px">${apt.ck}‰</td><td>${st.toFixed(2)} €</td></tr>`;
      if(so>0.005)ownRows+=`<tr><td>${e.description} <span style="font-size:9px;color:#7c3aed">Ιδ.</span></td><td style="color:#888;font-size:10px">${apt.ck}‰</td><td>${so.toFixed(2)} €</td></tr>`;
      return;
    }
    const amt=Number(e.amount);let share=0;
    if(type==="tenant") share=amt*apt.ck/1000;
    else if(type==="asan") share=amt*apt.ca/1000;

      const tm=Number(e.gas_total_metab)>0?Number(e.gas_total_metab):1;

function editFixed(){
  let h=`<div class="mt">📌 Αλλαγή Κεντρικών Παγίων <button class="mc" onclick="closeM()">×</button></div>`;
  h+=`<div style="font-size:11px;color:var(--tx3);margin-bottom:12px">Ισχύουν για όλους τους πυρήνες κάθε μήνα</div>`;
  FIXED_EXPENSES.forEach((f,i)=>{
    h+=`<div class="fg"><label class="fl">${f.icon} ${f.desc}</label><input id="fix_${i}" class="fi" type="number" step="0.01" value="${f.amt}" placeholder="0.00"></div>`;
  });
  h+=`<button class="btn bp bblk" onclick="saveFixed()">✓ Αποθήκευση</button>`;
  openM(h);
}
async function saveFixed(){
  const updated=FIXED_EXPENSES.map((f,i)=>{const el=document.getElementById("fix_"+i);return {...f,amt:parseFloat(el?.value||f.amt)};});
  // Update each fixed expense by id in Supabase
  await Promise.all(updated.map(f=>sbUpdate("fixed_expenses",f.id,{amount:f.amt})));
  FIXED_EXPENSES=updated;
  await loadAll();closeM();flash("✓ Πάγια αποθηκεύτηκαν");openExpenses("ce");
}

function editCoreFixed(){
  let h=`<div class="mt">📌 Πάγια Πυρήνα <button class="mc" onclick="closeM()">×</button></div>`;
  h+=`<div style="font-size:11px;color:var(--tx3);margin-bottom:12px">Εμφανίζονται αυτόματα κάθε μήνα — διαγράφεις όταν δεν χρειάζονται</div>`;
  h+=`<div class="fg"><label class="fl">Περιγραφή *</label><input id="cfDesc" class="fi" placeholder="π.χ. Συντήρηση Ασανσέρ Έκτακτη"></div>`;
  h+=`<div class="fg2"><div class="fg"><label class="fl">Ποσό (€) *</label><input id="cfAmt" class="fi" type="number" step="0.01" placeholder="0.00"></div>`;
  h+=`<div class="fg"><label class="fl">Χρεώνεται σε</label><select id="cfType" class="fi">`;
  h+=`<option value="tenant">Κάτοικος (×χιλ.)</option><option value="asan">Ασανσέρ (×χιλ.ασαν)</option><option value="owner">Ιδιοκτήτης (×χιλ.)</option><option value="express">Ίσα ÷${BUILDING.totalApts}</option>`;
  h+=`</select></div></div>`;
  h+=`<button class="btn bp bblk" onclick="saveCoreFixed()">✓ Προσθήκη</button>`;
  // Υπάρχοντα
  if((D.coreFixed||[]).length>0){
    h+=`<div style="margin-top:14px;border-top:1px solid var(--br);padding-top:10px"><div style="font-size:11px;font-weight:600;margin-bottom:7px">Ενεργά πάγια πυρήνα:</div>`;
    D.coreFixed.forEach(f=>{
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--br);font-size:11px">`;
      h+=`<div><div style="font-weight:500">${f.desc}</div><div style="font-size:10px;color:var(--tx3)">${f.chargeType==="asan"?"🛗 Ασανσέρ":f.chargeType==="owner"?"Ιδιοκτήτης":"Κάτοικος"}</div></div>`;
      h+=`<div style="display:flex;align-items:center;gap:8px"><span style="font-weight:600">${fmt(f.amt)}</span>`;
      h+=`<button onclick="delCoreFixed('${f.id}')" style="background:none;border:none;color:var(--rd);cursor:pointer;font-size:15px">×</button></div></div>`;
    });
    h+=`</div>`;
  }
  openM(h);
}
async function saveCoreFixed(){
  const desc=document.getElementById("cfDesc").value;const amt=document.getElementById("cfAmt").value;
  if(!desc||!amt){flash(lang==="el"?"Συμπλήρωσε όλα":"Fill all","er");return;}
  const row={description:desc,amount:parseFloat(amt),charge_type:document.getElementById("cfType").value,created_at:new Date().toISOString()};
  await sbInsert("core_fixed",row);await loadAll();closeM();flash("✓");openExpenses("ke");
}
async function delCoreFixed(id){
  if(!confirm(lang==="el"?"Διαγραφή;":"Delete?"))return;
  await sbDelete("core_fixed",id);await loadAll();flash(lang==="el"?"Διαγράφηκε":"Deleted");editCoreFixed();
}

// ═══════════════════════════════════

buildGrid();
</script>
